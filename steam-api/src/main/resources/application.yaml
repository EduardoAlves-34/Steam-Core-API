spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/steam_db
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  data:
    redis:
    host: localhost
    port: 6379

server:
  port: 8080